services:
  - type: web
    name: ma-dd-api
    runtime: docker
    region: singapore
    plan: starter
    envVars:
      - key: PYTHONPATH
        value: /app/backend
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: AUTH_ENABLED
        value: "true"
      - key: AUDIT_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: '["https://ma-dd.vercel.app"]'
      - key: BRAND_NAME
        value: "M&A Due Diligence AI"
      - key: FIRM_NAME
        value: "Your Law Firm"
      - key: FIRM_BASE_URL
        value: "https://ma-dd.vercel.app"
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /api/health
    domains:
      - api.ma-dd.com
