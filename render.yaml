services:
  - type: web
    name: ma-dd-api
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --proxy-headers --forwarded-allow-ips *
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PYTHONPATH
        value: /app/backend
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: AUTH_ENABLED
        value: "true"
      - key: AUDIT_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: '["https://ma-dd.vercel.app"]'
      - key: BRAND_NAME
        value: "M&A Due Diligence AI"
      - key: FIRM_NAME
        value: "Your Law Firm"
      - key: FIRM_BASE_URL
        value: "https://ma-dd.vercel.app"
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /api/health
    domains:
      - api.ma-dd.com
